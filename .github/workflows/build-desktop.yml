name: "Build Desktop App"

on:
  push:
    tags:
      - 'v*' # Se déclenche à la création d'un tag de version (ex: v0.1.0)

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './web-client/package.json'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (frontend)
        run: |
          cd web-client
          npm install

      - name: Build frontend
        run: |
          cd web-client
          npm run build

      - name: Build Tauri Desktop App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "QSE Studio ${{ github.ref_name }}"
          releaseBody: "Release automatique de QSE Studio. Téléchargez le fichier d'installation ci-dessous."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
