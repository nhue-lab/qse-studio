name: "Build Desktop App"

on:
  push:
    tags:
      - 'v*'

jobs:
  build-tauri:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './web-client/package-lock.json'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (web-client)
        run: |
          cd web-client
          npm ci

      - name: Build static frontend
        run: |
          cd web-client
          npm run build

      - name: Build Tauri Desktop App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "QSE Studio ${{ github.ref_name }}"
          releaseBody: "Release officielle de QSE Studio. Téléchargez le fichier d'installation Windows ci-dessous."
          releaseDraft: false
          prerelease: false
